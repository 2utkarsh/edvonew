# Sample Apache vhost snippet (conceptual)
#
# - /      -> Next.js (reverse proxy to localhost:3000)
# - /backend -> Laravel (Alias to public/)
#
# Enable modules: proxy, proxy_http, rewrite, headers

<VirtualHost *:80>
    ServerName edvo.in
    ServerAlias www.edvo.in

    ProxyPreserveHost On

    # Next.js frontend
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Laravel backend
    Alias /backend "C:/xampp/htdocs/edvo-backend/public"
    <Directory "C:/xampp/htdocs/edvo-backend/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

