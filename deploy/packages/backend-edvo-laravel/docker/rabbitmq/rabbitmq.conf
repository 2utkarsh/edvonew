# RabbitMQ Configuration for Mentor LMS

# Network
listeners.tcp.default = 5672

# Management Plugin
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0
management.tcp.ssl = false

# Memory
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.5

# Disk Free Space
disk_free_limit.absolute = 1GB

# Heartbeats
heartbeat = 60

# Default User/Password (will be overridden by environment)
default_user = admin
default_pass = admin123
default_user_tags.administrator = true

# Log Levels
log.console.level = info
log.file.level = info

# File Locations
log.file.level = info
log.console = true
log.file = true

# SSL (disabled by default)
ssl_options.verify = verify_none
ssl_options.fail_if_no_peer_cert = false

# Cluster Configuration (if needed in future)
# cluster_formation.peer_discovery_backend = classic_config
# cluster_formation.classic_config.nodes.1 = rabbit@node1
# cluster_formation.classic_config.nodes.2 = rabbit@node2

# Federation (if needed in future)
# federation_upstream = "my-upstream"
# federation_upstream_exchange = "my-exchange"
