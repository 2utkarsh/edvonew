services:
  redis:
    image: redis:7-alpine
    container_name: edvo-livekit-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    container_name: edvo-livekit
    restart: unless-stopped
    depends_on:
      - redis
    command:
      - --config
      - /etc/livekit/livekit.yaml
    ports:
      - "${LIVEKIT_WS_PORT:-7880}:7880/tcp"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881/tcp"
      - "${LIVEKIT_RTC_UDP_PORT_START:-50000}-${LIVEKIT_RTC_UDP_PORT_END:-50100}:${LIVEKIT_RTC_UDP_PORT_START:-50000}-${LIVEKIT_RTC_UDP_PORT_END:-50100}/udp"
    volumes:
      - ./generated/livekit.yaml:/etc/livekit/livekit.yaml:ro

volumes:
  redis_data:
