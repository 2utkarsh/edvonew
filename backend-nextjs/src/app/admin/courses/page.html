<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - EDVO Admin</title>
  <link rel="stylesheet" href="/backend/admin/styles.css" />
  <style>
    /* Reuse dashboard styles and add specific ones */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .filter-input {
      padding: 12px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      min-width: 250px;
    }

    .filter-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .filter-select {
      padding: 12px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      background: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Sidebar (same as dashboard) -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span>ED</span>VO Admin</div>
    
    <div class="nav-section">
      <div class="nav-section-title">Main Menu</div>
      <a href="/backend/admin" class="nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="/backend/admin/courses" class="nav-item active">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Courses</span>
      </a>
      <a href="/backend/admin/blogs" class="nav-item">
        <span class="nav-icon">??</span>
        <span class="nav-label">Blogs</span>
      </a>
      <a href="/backend/admin/users" class="nav-item">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Users</span>
      </a>
      <a href="/backend/admin/exams" class="nav-item">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Exams</span>
      </a>
      <a href="/backend/admin/jobs" class="nav-item">
        <span class="nav-icon">💼</span>
        <span class="nav-label">Jobs</span>
      </a>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-title">Settings</div>
      <a href="#" class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
      <a href="#" class="nav-item" onclick="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="top-bar">
      <h1 class="page-title">Courses Management</h1>
      <div class="user-menu">
        <div class="user-info">
          <div class="user-name">Admin User</div>
          <div class="user-role">Administrator</div>
        </div>
        <div class="user-avatar">A</div>
      </div>
    </div>

    <div class="dashboard-content">
      <!-- Filters -->
      <div class="filters">
        <input type="text" class="filter-input" placeholder="🔍 Search courses..." id="searchInput" />
        <select class="filter-select" id="categoryFilter">
          <option value="">All Categories</option>
          <option value="Programming">Programming</option>
          <option value="Web Development">Web Development</option>
          <option value="Data Science">Data Science</option>
          <option value="Marketing">Marketing</option>
        </select>
        <select class="filter-select" id="statusFilter">
          <option value="">All Status</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
          <option value="archived">Archived</option>
        </select>
        <button class="btn btn-primary" onclick="showAddModal()">+ Add Course</button>
      </div>

      <!-- Courses Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Course</th>
              <th>Instructor</th>
              <th>Category</th>
              <th>Students</th>
              <th>Price</th>
              <th>Rating</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="coursesTableBody">
            <tr>
              <td colspan="8" style="text-align: center; padding: 40px; color: #718096;">
                Loading courses...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add Course Modal -->
  <div id="addModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add New Course</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <p style="text-align: center; color: #718096; padding: 40px;">
          Course creation form coming soon...
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn" style="background: #e2e8f0;" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary">Create Course</button>
      </div>
    </div>
  </div>

  <script src="/backend/admin/admin.js"></script>
  <script>
    // Fetch and display courses
    async function loadCourses() {
      try {
        const response = await fetch('/backend/api/v1/courses');
        const data = await response.json();
        
        if (data.success) {
          displayCourses(data.data.courses);
        }
      } catch (error) {
        console.error('Failed to load courses:', error);
      }
    }

    function displayCourses(courses) {
      const tbody = document.getElementById('coursesTableBody');
      
      if (courses.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" style="text-align: center; padding: 40px; color: #718096;">
              No courses found. Create your first course!
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = courses.map(course => `
        <tr>
          <td>
            <div style="display: flex; align-items: center; gap: 12px;">
              ${course.thumbnail ? `<img src="${course.thumbnail}" style="width: 50px; height: 50px; border-radius: 10px; object-fit: cover;" />` : 
                '<div style="width: 50px; height: 50px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">' + course.title.charAt(0) + '</div>'}
              <div>
                <div style="font-weight: 600;">${course.title}</div>
                <div style="font-size: 0.85rem; color: #718096;">${course.shortDescription || ''}</div>
              </div>
            </div>
          </td>
          <td>${course.instructorName || 'Unknown'}</td>
          <td><span class="badge badge-info">${course.category}</span></td>
          <td>${course.studentsEnrolled.toLocaleString()}</td>
          <td>₹${course.price.toLocaleString()}</td>
          <td>⭐ ${course.rating.toFixed(1)} (${course.reviewCount})</td>
          <td><span class="badge badge-${course.status === 'published' ? 'success' : 'warning'}">${course.status}</span></td>
          <td>
            <div class="action-btns">
              <button class="action-btn edit" onclick="editCourse('${course.id}')">Edit</button>
              <button class="action-btn delete" onclick="deleteCourse('${course.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function showAddModal() {
      document.getElementById('addModal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('addModal').style.display = 'none';
    }

    function editCourse(id) {
      alert('Edit course: ' + id);
    }

    function deleteCourse(id) {
      if (confirm('Are you sure you want to delete this course?')) {
        alert('Delete course: ' + id);
      }
    }

    // Close modal on outside click
    window.onclick = function(event) {
      const modal = document.getElementById('addModal');
      if (event.target == modal) {
        closeModal();
      }
    }

    // Initialize
    loadCourses();
  </script>
</body>
</html>
