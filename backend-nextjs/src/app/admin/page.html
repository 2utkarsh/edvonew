<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDVO Admin - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      color: white;
      text-align: center;
    }

    .left-panel h1 {
      font-size: 4rem;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .left-panel h1 span {
      color: rgba(255,255,255,0.7);
    }

    .left-panel p {
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 400px;
      line-height: 1.6;
    }

    .features {
      margin-top: 60px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .feature {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .right-panel {
      width: 500px;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 50px;
      box-shadow: -10px 0 40px rgba(0,0,0,0.1);
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 10px;
    }

    .logo span {
      color: #764ba2;
    }

    .welcome-text {
      color: #666;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e1e1e1;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 24px;
      border-left: 4px solid #c33;
    }

    .demo-credentials {
      margin-top: 30px;
      padding: 20px;
      background: #f8f9ff;
      border-radius: 10px;
      text-align: center;
    }

    .demo-credentials p {
      color: #666;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .demo-credentials code {
      background: white;
      padding: 8px 16px;
      border-radius: 6px;
      display: inline-block;
      font-size: 13px;
      color: #667eea;
    }

    @media (max-width: 900px) {
      .left-panel {
        display: none;
      }
      .right-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <h1><span>ED</span>VO</h1>
    <p>Admin Dashboard - Manage your learning platform with ease</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div>
          <strong>Analytics</strong>
          <p style="font-size: 0.9rem; margin-top: 5px; opacity: 0.8;">Track platform growth</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">📚</div>
        <div>
          <strong>Courses</strong>
          <p style="font-size: 0.9rem; margin-top: 5px; opacity: 0.8;">Manage content</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">👥</div>
        <div>
          <strong>Users</strong>
          <p style="font-size: 0.9rem; margin-top: 5px; opacity: 0.8;">Student management</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">💼</div>
        <div>
          <strong>Jobs</strong>
          <p style="font-size: 0.9rem; margin-top: 5px; opacity: 0.8;">Job board control</p>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="logo"><span>ED</span>VO Admin</div>
    <p class="welcome-text">Welcome back! Please sign in to continue.</p>
    
    <div id="error" class="error-message" style="display: none;"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="admin@edvo.com" required />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        Sign In →
      </button>
    </form>
    
    <div class="demo-credentials">
      <p>Demo Credentials:</p>
      <code>admin@edvo.com / admin123</code>
    </div>
  </div>

  <script>
    // Demo mode - bypass authentication
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      
      // Simple demo check
      if (email === 'admin@edvo.com' && password === 'admin123') {
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminEmail', email);
        window.location.href = '/backend/admin/dashboard';
      } else {
        errorDiv.textContent = 'Invalid credentials. Use: admin@edvo.com / admin123';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
