<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team - EDVO Admin</title>
  <link rel="stylesheet" href="/backend/admin/styles.css" />
  <style>
    .page-shell {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .stat-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #e2e8f0;
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: #1a202c;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .member-card {
      background: white;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .member-card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      background: #edf2f7;
    }

    .member-content {
      padding: 24px;
    }

    .member-name {
      font-size: 1.35rem;
      font-weight: 800;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .member-title {
      color: #5a67d8;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .member-bio {
      color: #718096;
      line-height: 1.7;
      font-size: 0.94rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .search-input {
      width: min(360px, 100%);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #cbd5e0;
      font-size: 0.95rem;
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .empty-state {
      padding: 48px 24px;
      border-radius: 24px;
      text-align: center;
      color: #718096;
      border: 1px dashed #cbd5e0;
      background: white;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><span>ED</span>VO Admin</div>

    <div class="nav-section">
      <div class="nav-section-title">Main Menu</div>
      <a href="/backend/admin" class="nav-item">
        <span class="nav-icon">??</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="/backend/admin/courses" class="nav-item">
        <span class="nav-icon">??</span>
        <span class="nav-label">Courses</span>
      </a>
      <a href="/backend/admin/blogs" class="nav-item">
        <span class="nav-icon">??</span>
        <span class="nav-label">Blogs</span>
      </a>
      <a href="/backend/admin/team" class="nav-item active">
        <span class="nav-icon">??</span>
        <span class="nav-label">Team</span>
      </a>
      <a href="/backend/admin/users" class="nav-item">
        <span class="nav-icon">??</span>
        <span class="nav-label">Users</span>
      </a>
      <a href="/backend/admin/jobs" class="nav-item">
        <span class="nav-icon">??</span>
        <span class="nav-label">Jobs</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Settings</div>
      <a href="#" class="nav-item">
        <span class="nav-icon">??</span>
        <span class="nav-label">Settings</span>
      </a>
      <a href="#" class="nav-item" onclick="logout()">
        <span class="nav-icon">??</span>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="top-bar">
      <h1 class="page-title">Our Team</h1>
      <div class="user-menu">
        <div class="user-info">
          <div class="user-name">Admin User</div>
          <div class="user-role">Administrator</div>
        </div>
        <div class="user-avatar">A</div>
      </div>
    </div>

    <div class="dashboard-content">
      <div class="page-shell">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Team Members</div>
            <div class="stat-value" id="totalMembers">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Unique Roles</div>
            <div class="stat-value" id="totalRoles">0</div>
          </div>
        </div>

        <div class="toolbar">
          <div>
            <div class="table-title">Team Directory</div>
            <div style="color:#718096;font-size:0.92rem;margin-top:4px;">Showing the same team feed used on the frontend Our Team page.</div>
          </div>
          <input id="searchInput" class="search-input" type="search" placeholder="Search team members..." />
        </div>

        <div id="membersGrid" class="grid"></div>
      </div>
    </div>
  </main>

  <script src="/backend/admin/admin.js"></script>
  <script>
    let members = [];

    function updateStats(items) {
      document.getElementById('totalMembers').textContent = items.length;
      document.getElementById('totalRoles').textContent = new Set(items.map((item) => item.title)).size;
    }

    function renderMembers(items) {
      const grid = document.getElementById('membersGrid');
      if (!items.length) {
        grid.innerHTML = '<div class="empty-state">No team members matched your search.</div>';
        return;
      }

      grid.innerHTML = items.map((member) => `
        <article class="member-card">
          <img src="${member.image}" alt="${member.name}" />
          <div class="member-content">
            <div class="member-name">${member.name}</div>
            <div class="member-title">${member.title}</div>
            <div class="member-bio">${member.bio}</div>
          </div>
        </article>
      `).join('');
    }

    function filterMembers() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = members.filter((member) =>
        member.name.toLowerCase().includes(query) ||
        member.title.toLowerCase().includes(query) ||
        member.bio.toLowerCase().includes(query)
      );
      updateStats(filtered);
      renderMembers(filtered);
    }

    async function loadMembers() {
      try {
        const response = await fetch('/backend/api/instructors');
        const payload = await response.json();
        members = Array.isArray(payload.data) ? payload.data : [];
        updateStats(members);
        renderMembers(members);
      } catch (error) {
        console.error('Failed to load team members:', error);
        document.getElementById('membersGrid').innerHTML = '<div class="empty-state">Unable to load the team right now.</div>';
      }
    }

    document.getElementById('searchInput').addEventListener('input', filterMembers);
    loadMembers();
  </script>
</body>
</html>
