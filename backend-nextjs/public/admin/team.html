<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Team - EDVO Admin</title><link rel="stylesheet" href="/backend/admin/styles.css" />
  <style>.stack{display:flex;flex-direction:column;gap:24px}.panel,.stat{background:#fff;border:1px solid #e2e8f0;border-radius:20px;box-shadow:0 8px 30px rgba(15,23,42,.06);padding:24px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}.label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:#718096;margin-bottom:8px;font-weight:700}.value{font-size:2rem;font-weight:800}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.input,.textarea,.select,.file{width:100%;padding:12px 16px;border:1px solid #cbd5e0;border-radius:12px;font-size:.95rem;background:#fff}.textarea{min-height:120px;resize:vertical}.actions,.table-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar{display:flex;justify-content:space-between;gap:16px;align-items:center}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}.card{background:#fff;border-radius:24px;border:1px solid #e2e8f0;box-shadow:0 8px 30px rgba(15,23,42,.06);overflow:hidden}.card img{width:100%;height:220px;object-fit:cover;background:#edf2f7}.content{padding:20px}.name{font-size:1.2rem;font-weight:800}.title{color:#5a67d8;font-weight:700;margin:8px 0 12px}.bio{color:#718096;line-height:1.6}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 12px;font-size:.78rem;font-weight:700}.badge-status-active{background:rgba(72,187,120,.14);color:#2f855a}.badge-status-inactive{background:rgba(113,128,150,.14);color:#4a5568}.btn{border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.btn-primary{background:#667eea;color:#fff}.btn-secondary{background:#edf2f7;color:#1a202c}.btn-danger{background:#f56565;color:#fff}.preview{width:180px;height:180px;border-radius:20px;object-fit:cover;border:1px solid #e2e8f0;background:#f8fafc}.help{color:#718096;font-size:.88rem}</style>
</head>
<body>
<aside class="sidebar"><div class="sidebar-logo"><span>ED</span>VO Admin</div><div class="nav-section"><div class="nav-section-title">Main Menu</div><a href="/backend/admin" class="nav-item"><span class="nav-label">Dashboard</span></a><a href="/backend/admin/home-content" class="nav-item"><span class="nav-label">Home Content</span></a><a href="/backend/admin/courses" class="nav-item"><span class="nav-label">Courses</span></a><a href="/backend/admin/blogs" class="nav-item"><span class="nav-label">Blogs</span></a><a href="/backend/admin/tutorials" class="nav-item"><span class="nav-label">Tutorials</span></a><a href="/backend/admin/guides" class="nav-item"><span class="nav-label">Guides</span></a><a href="/backend/admin/team" class="nav-item active"><span class="nav-label">Team</span></a></div><div class="nav-section"><div class="nav-section-title">Settings</div><a href="#" class="nav-item" onclick="logout()"><span class="nav-label">Logout</span></a></div></aside>
<main class="main-content"><div class="top-bar"><h1 class="page-title">Our Team</h1><div class="user-avatar">A</div></div><div class="dashboard-content"><div class="stack">
<div class="stats"><div class="stat"><div class="label">Team Members</div><div class="value" id="totalMembers">0</div></div><div class="stat"><div class="label">Active</div><div class="value" id="activeMembers">0</div></div><div class="stat"><div class="label">Inactive</div><div class="value" id="inactiveMembers">0</div></div></div>
<section class="panel"><div class="toolbar"><div><div class="table-title" id="formTitle">Create Team Member</div><div class="help">Uploaded photos and order changes affect the frontend team section.</div></div></div><form id="teamForm" class="stack"><div class="grid"><input id="name" class="input" placeholder="Full name" required /><input id="title" class="input" placeholder="Role / title" required /><input id="order" class="input" type="number" min="0" value="0" placeholder="Display order" /><select id="status" class="select"><option value="active">Active</option><option value="inactive">Inactive</option></select><input id="imageFile" class="file" type="file" accept="image/*" /></div><img id="imagePreview" class="preview" src="/images/edvo-official-logo-v10.png" alt="Team preview" /><textarea id="bio" class="textarea" placeholder="Bio" required></textarea><div class="actions"><button id="submitButton" class="btn btn-primary" type="submit">Create Team Member</button><button id="cancelEdit" class="btn btn-secondary" type="button" style="display:none">Cancel Edit</button></div></form></section>
<section class="panel"><div class="toolbar"><div><div class="table-title">Manage Team</div><div class="help">Use Up and Down to reorder cards on the frontend.</div></div><input id="searchInput" class="input" type="search" placeholder="Search team members" /></div><div id="memberCards" class="cards"></div></section>
</div></div></main>
<script src="/backend/admin/admin.js"></script>
<script>
let members=[];let editingId=null;let imageValue='/images/edvo-official-logo-v10.png';const form=document.getElementById('teamForm');
function e(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function updateStats(){document.getElementById('totalMembers').textContent=members.length;document.getElementById('activeMembers').textContent=members.filter(x=>x.status==='active').length;document.getElementById('inactiveMembers').textContent=members.filter(x=>x.status==='inactive').length}
function resetForm(){editingId=null;form.reset();document.getElementById('status').value='active';document.getElementById('order').value='0';imageValue='/images/edvo-official-logo-v10.png';document.getElementById('imagePreview').src=imageValue;document.getElementById('formTitle').textContent='Create Team Member';document.getElementById('submitButton').textContent='Create Team Member';document.getElementById('cancelEdit').style.display='none'}
function startEdit(id){const item=members.find(x=>x.id===id);if(!item)return;editingId=id;document.getElementById('name').value=item.name||'';document.getElementById('title').value=item.title||'';document.getElementById('bio').value=item.bio||'';document.getElementById('status').value=item.status||'active';document.getElementById('order').value=item.order||0;imageValue=item.image||imageValue;document.getElementById('imagePreview').src=imageValue;document.getElementById('imageFile').value='';document.getElementById('formTitle').textContent='Edit Team Member';document.getElementById('submitButton').textContent='Update Team Member';document.getElementById('cancelEdit').style.display='inline-flex';window.scrollTo({top:0,behavior:'smooth'})}
async function loadMembers(){const payload=await adminFetch('/backend/api/admin/team');members=Array.isArray(payload.data)?payload.data:[];members.sort((a,b)=>(a.order||0)-(b.order||0));updateStats();renderMembers()}
function renderMembers(){const q=document.getElementById('searchInput').value.trim().toLowerCase();const items=members.filter((m)=>!q||m.name.toLowerCase().includes(q)||m.title.toLowerCase().includes(q)||m.bio.toLowerCase().includes(q));document.getElementById('memberCards').innerHTML=items.length?items.map((m,i)=>`<article class="card"><img src="${e(m.image)}" alt="${e(m.name)}" /><div class="content"><div class="name">${e(m.name)}</div><div class="title">${e(m.title)}</div><div class="bio">${e(m.bio)}</div><div class="actions" style="margin-top:16px"><select class="select" style="max-width:140px" onchange="updateMember('${m.id}',{status:this.value})"><option value="active" ${m.status==='active'?'selected':''}>Active</option><option value="inactive" ${m.status==='inactive'?'selected':''}>Inactive</option></select><span class="badge badge-status-${m.status}">${e(m.status)}</span><button class="btn btn-secondary" type="button" onclick="moveMember('${m.id}',-1)">Up</button><button class="btn btn-secondary" type="button" onclick="moveMember('${m.id}',1)">Down</button><button class="btn btn-secondary" type="button" onclick="startEdit('${m.id}')">Edit</button><button class="btn btn-danger" type="button" onclick="deleteMember('${m.id}')">Delete</button></div></div></article>`).join(''):'<div class="help">No team members found.</div>'}
async function updateMember(id,patch){await adminFetch(`/backend/api/admin/team/${id}`,{method:'PATCH',body:JSON.stringify(patch)});await loadMembers();showToast('Team member updated','success')}
async function moveMember(id,dir){const idx=members.findIndex(x=>x.id===id);const swap=idx+dir;if(idx<0||swap<0||swap>=members.length)return;const a=members[idx],b=members[swap];await adminFetch(`/backend/api/admin/team/${a.id}`,{method:'PATCH',body:JSON.stringify({order:b.order||swap})});await adminFetch(`/backend/api/admin/team/${b.id}`,{method:'PATCH',body:JSON.stringify({order:a.order||idx})});await loadMembers();showToast('Team order updated','success')}
async function deleteMember(id){if(!confirm('Delete this team member?'))return;await adminFetch(`/backend/api/admin/team/${id}`,{method:'DELETE'});if(editingId===id)resetForm();await loadMembers();showToast('Team member deleted','success')}
document.getElementById('imageFile').addEventListener('change',()=>{const file=document.getElementById('imageFile').files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{if(typeof reader.result==='string'){imageValue=reader.result;document.getElementById('imagePreview').src=imageValue;}};reader.readAsDataURL(file)});
form.addEventListener('submit',async(e)=>{e.preventDefault();const payload={name:document.getElementById('name').value,title:document.getElementById('title').value,bio:document.getElementById('bio').value,status:document.getElementById('status').value,order:document.getElementById('order').value,image:imageValue};if(editingId){await adminFetch(`/backend/api/admin/team/${editingId}`,{method:'PATCH',body:JSON.stringify(payload)});showToast('Team member updated','success')}else{await adminFetch('/backend/api/admin/team',{method:'POST',body:JSON.stringify(payload)});showToast('Team member created','success')}resetForm();await loadMembers()});
document.getElementById('cancelEdit').addEventListener('click',resetForm);document.getElementById('searchInput').addEventListener('input',renderMembers);loadMembers().then(resetForm)
</script>
</body>
</html>
